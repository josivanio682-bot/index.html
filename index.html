<script>
  const { createFFmpeg, fetchFile } = FFmpeg;
  const ffmpeg = createFFmpeg({ log: false });

  const videoInput = document.getElementById('videoInput');
  const bgInput = document.getElementById('bgInput');
  const durationSelect = document.getElementById('durationSelect');
  const processBtn = document.getElementById('processBtn');
  const previewArea = document.getElementById('preview-area');
  const canvas = document.getElementById('previewCanvas');
  const ctx = canvas.getContext('2d');
  const status = document.getElementById('status');

  let videoFile = null;
  let bgFile = null;
  let videoDuration = 0;

  // Função para verificar se os arquivos foram selecionados e destravar o botão
  function checkFiles() {
    if (videoInput.files && videoInput.files[0] && bgInput.files && bgInput.files[0]) {
      videoFile = videoInput.files[0];
      bgFile = bgInput.files[0];
      
      // Habilita o botão diretamente
      processBtn.disabled = false;
      status.innerText = "✅ Arquivos detectados! Clique no botão para iniciar.";
      
      // Tenta gerar a demonstração em background
      generatePreview();
    }
  }

  function generatePreview() {
    try {
      const bgImg = new Image();
      bgImg.src = URL.createObjectURL(bgFile);

      bgImg.onload = () => {
        ctx.drawImage(bgImg, 0, 0, 1080, 1920);

        const video = document.createElement('video');
        video.src = URL.createObjectURL(videoFile);
        
        video.onloadedmetadata = () => {
          videoDuration = video.duration;
        };

        video.currentTime = 3;

        video.onloadeddata = () => {
          ctx.drawImage(video, 0, 555, 1080, 810);
          previewArea.style.display = "block";
        };
      };
    } catch (e) {
      console.log("Preview ignorado, pronto para processar.");
    }
  }

  // Verifica tanto no 'change' quanto no 'input' (para garantir em qualquer celular)
  videoInput.addEventListener('change', checkFiles);
  bgInput.addEventListener('change', checkFiles);
  videoInput.addEventListener('input', checkFiles);
  bgInput.addEventListener('input', checkFiles);

  processBtn.addEventListener('click', async () => {
    if (!videoInput.files[0] || !bgInput.files[0]) {
      alert("Por favor, selecione o vídeo e a imagem de fundo!");
      return;
    }

    videoFile = videoInput.files[0];
    bgFile = bgInput.files[0];

    processBtn.disabled = true;
    status.innerText = "⏳ Carregando motor de vídeo... Aguarde!";

    try {
      if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
      }

      status.innerText = "Carregando imagem de fundo...";
      ffmpeg.FS('writeFile', 'bg.png', await fetchFile(bgFile));

      status.innerText = "Carregando vídeo (pode levar alguns segundos em vídeos longos)...";
      ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(videoFile));

      const zip = new JSZip();
      const cutDuration = parseInt(durationSelect.value);
      
      // Se não pegou a duração no preview, define uma estimativa padrão
      const totalTime = videoDuration || 900; 

      let start = 0;
      let count = 1;

      while (start + 20 <= totalTime) {
        let currentCutDuration = cutDuration;
        
        if (start + currentCutDuration > totalTime) {
          currentCutDuration = totalTime - start;
        }

        if (currentCutDuration < 20) break;

        const outName = `corte_${String(count).padStart(2, '0')}.mp4`;
        status.innerText = `🎬 Renderizando Corte ${count} (Início: ${(start / 60).toFixed(1)} min)...`;

        await ffmpeg.run(
          '-ss', `${start.toFixed(1)}`,
          '-t', `${currentCutDuration.toFixed(1)}`,
          '-i', 'input.mp4',
          '-loop', '1',
          '-i', 'bg.png',
          '-filter_complex', '[1:v]scale=1080:1920[bg]; [0:v]scale=1080:810[vid]; [bg][vid]overlay=0:555:shortest=1',
          '-c:v', 'libx264',
          '-preset', 'ultrafast',
          '-crf', '28',
          '-c:a', 'aac',
          '-b:a', '128k',
          outName
        );

        try {
          const data = ffmpeg.FS('readFile', outName);
          zip.file(outName, data.buffer);
          ffmpeg.FS('unlink', outName);
          
          start += currentCutDuration;
          count++;
        } catch (e) {
          break; // Fim do arquivo atingido
        }

        await new Promise(resolve => setTimeout(resolve, 100));
      }

      ffmpeg.FS('unlink', 'input.mp4');

      status.innerText = "📦 Compactando tudo no arquivo .ZIP...";
      const zipContent = await zip.generateAsync({ type: "blob" });

      const downloadLink = document.createElement("a");
      downloadLink.href = URL.createObjectURL(zipContent);
      downloadLink.download = "cortes_gerados_9x16.zip";
      downloadLink.click();

      status.innerText = "🎉 Sucesso! O arquivo .ZIP foi baixado!";
    } catch (err) {
      console.error(err);
      status.innerText = "❌ Erro ao processar. Recarregue a página e tente novamente.";
    } finally {
      processBtn.disabled = false;
    }
  });
</script>
