<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IA Gerador de Cortes 9:16</title>
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background-color: #0f172a; color: #f8fafc; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .container { background: #1e293b; width: 100%; max-width: 480px; padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
    h1 { font-size: 1.4rem; margin-bottom: 8px; color: #38bdf8; }
    p.desc { font-size: 0.85rem; color: #94a3b8; margin-bottom: 20px; }
    
    .upload-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .upload-btn { background: #334155; padding: 12px; border-radius: 8px; border: 2px dashed #475569; cursor: pointer; text-align: left; }
    .upload-btn label { font-size: 0.85rem; font-weight: bold; color: #38bdf8; display: block; margin-bottom: 4px; }
    .upload-btn input { width: 100%; font-size: 0.85rem; color: #cbd5e1; }

    .control-group { text-align: left; margin-bottom: 20px; }
    .control-group label { font-size: 0.85rem; font-weight: bold; color: #cbd5e1; display: block; margin-bottom: 6px; }
    select { width: 100%; padding: 10px; background: #0f172a; color: #fff; border: 1px solid #334155; border-radius: 8px; font-size: 0.95rem; }

    .btn-action { width: 100%; padding: 14px; background: #0284c7; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
    .btn-action:disabled { background: #475569; cursor: not-allowed; }
    
    #status { margin-top: 15px; font-size: 0.85rem; color: #a855f7; min-height: 20px; font-weight: 500; word-break: break-word; }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ffmpeg/0.11.6/ffmpeg.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<div class="container">
  <h1>🎬 Gerador de Cortes 9:16</h1>
  <p class="desc">Modo ultra-leve para não travar a memória do celular.</p>

  <div class="upload-group">
    <div class="upload-btn">
      <label>1. Vídeo da Galeria (MP4/MOV)</label>
      <input type="file" id="videoInput" accept="video/*">
    </div>
    <div class="upload-btn">
      <label>2. Imagem de Fundo (Galeria)</label>
      <input type="file" id="bgInput" accept="image/*">
    </div>
  </div>

  <div class="control-group">
    <label>Duração de Cada Corte:</label>
    <select id="durationSelect">
      <option value="30" selected>30 Segundos</option>
      <option value="45">45 Segundos</option>
      <option value="60">60 Segundos</option>
    </select>
  </div>

  <button id="processBtn" class="btn-action" disabled>🚀 Processar e Gerar Cortes</button>

  <div id="status">Aguardando envio dos arquivos...</div>
</div>

<script>
  const { createFFmpeg } = FFmpeg;
  const ffmpeg = createFFmpeg({ log: false });

  const videoInput = document.getElementById('videoInput');
  const bgInput = document.getElementById('bgInput');
  const durationSelect = document.getElementById('durationSelect');
  const processBtn = document.getElementById('processBtn');
  const status = document.getElementById('status');

  function checkReady() {
    if (videoInput.files[0] && bgInput.files[0]) {
      processBtn.disabled = false;
      status.innerText = "✅ Prontos para iniciar! Clique no botão acima.";
    }
  }

  videoInput.addEventListener('change', checkReady);
  bgInput.addEventListener('change', checkReady);

  // Helper leve para ler arquivo sem usar o fetchFile pesado
  function readFileAsBuffer(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(new Uint8Array(reader.result));
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  processBtn.addEventListener('click', async () => {
    const videoFile = videoInput.files[0];
    const bgFile = bgInput.files[0];

    if (!videoFile || !bgFile) return;

    processBtn.disabled = true;
    status.innerText = "⏳ Inicializando motor gráfico no celular...";

    try {
      if (!ffmpeg.isLoaded()) {
        await ffmpeg.load();
      }

      status.innerText = "Carregando imagem de fundo...";
      const bgData = await readFileAsBuffer(bgFile);
      ffmpeg.FS('writeFile', 'bg.png', bgData);

      status.innerText = "Lendo vídeo (processando sem estourar a memória)...";
      const videoData = await readFileAsBuffer(videoFile);
      ffmpeg.FS('writeFile', 'input.mp4', videoData);

      const zip = new JSZip();
      const cutDuration = parseInt(durationSelect.value);

      // Descobre a duração criando um elemento temporário
      const tempVideo = document.createElement('video');
      tempVideo.src = URL.createObjectURL(videoFile);
      await new Promise(r => tempVideo.onloadedmetadata = r);
      const totalTime = tempVideo.duration || 300;

      let start = 0;
      let count = 1;

      while (start + 15 <= totalTime) {
        let currentDuration = cutDuration;
        if (start + currentDuration > totalTime) {
          currentDuration = totalTime - start;
        }

        const outName = `corte_${String(count).padStart(2, '0')}.mp4`;
        status.innerText = `🎬 Renderizando Corte ${count} (${(start/60).toFixed(1)}m de ${(totalTime/60).toFixed(1)}m)...`;

        // Execução ultraleve
        await ffmpeg.run(
          '-ss', `${start.toFixed(1)}`,
          '-t', `${currentDuration.toFixed(1)}`,
          '-i', 'input.mp4',
          '-loop', '1',
          '-i', 'bg.png',
          '-filter_complex', '[1:v]scale=1080:1920[bg]; [0:v]scale=1080:810[vid]; [bg][vid]overlay=0:555:shortest=1',
          '-c:v', 'libx264',
          '-preset', 'ultrafast',
          '-tune', 'fastdecode',
          '-crf', '30',
          '-c:a', 'aac',
          outName
        );

        const data = ffmpeg.FS('readFile', outName);
        zip.file(outName, data.buffer);
        ffmpeg.FS('unlink', outName); // Libera a RAM imediatamente

        start += currentDuration;
        count++;

        // Pausa pro celular limpar a memória RAM
        await new Promise(r => setTimeout(r, 200));
      }

      ffmpeg.FS('unlink', 'input.mp4');
      ffmpeg.FS('unlink', 'bg.png');

      status.innerText = "📦 Compactando em arquivo .ZIP...";
      const zipContent = await zip.generateAsync({ type: "blob" });

      const downloadLink = document.createElement("a");
      downloadLink.href = URL.createObjectURL(zipContent);
      downloadLink.download = "cortes_gerados_9x16.zip";
      downloadLink.click();

      status.innerText = "🎉 Concluído com sucesso! Download iniciado.";
    } catch (err) {
      console.error(err);
      status.innerText = "❌ Ocorreu uma falha de memória. Tente limpar o cache do navegador e reabrir a aba.";
    } finally {
      processBtn.disabled = false;
    }
  });
</script>

</body>
</html>
